body:
  text: 詩傳詩說駁義詩類提要臣等謹案詩傳詩說駁義五卷國朝毛竒齡撰明嘉靖中鄞人豐坊作魯詩世學一書往往自出新義得解於舊注之外恐其說之不信遂託言家有魯詩為其逺祖稷所傳一為子貢詩傳一為申培詩說並列所作世學中厥後郭子章傳刻二書自稱得黃佐所藏祕閣石本於是二書乃單行明代說詩諸家以其言往往近理多採用之遂盛傳於時竒齡因其託名於古乃引證諸書以紏之夫易傳託之於子夏書傳託之於孔安國其說之可取者皆行於世其源流授受則說經之家務核其真竒齡是書不以其說為可廢而於依託之處則一一辨之亦可謂持平之論矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8156ff299d2eeb804ae5770b604246f078f9a9395a4892625e318bc7311b1943
