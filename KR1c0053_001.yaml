body:
  text: 詩傳詩說駁義卷一翰林院檢討毛竒齡撰詩傳子貢作詩說申培作向來從無此書至明嘉靖中廬陵中丞郭相奎家忽出藏本見示云得之黃文裕祕閣石本然究不知當時所為石本者何如也苐見相奎家所傳本則摹古篆書而附以楷體今文用作音注嗣此則張元平司馬刻于貴竹專用楷體無篆文而李本寧宗伯則復合刻篆文楷體于白下且加子夏小序于其端共刻之名曰二賢言詩而于是詩傳詩說一入之百家名書再入之漢魏叢書而二書之名遂相沿不可去矣按從來說詩不及子貢即古今藝文志目亦從無子貢詩傳徒以論語有賜也始可與言詩已矣一語遂造為此書其識趣弇陋即此可見若申培魯人善說詩故漢書儒林傳云言詩于魯則申培公而藝文志亦云漢興魯申公為詩訓故則申培說詩固自有據但傳又云申公獨以詩經為訓故以教無傳言苐有口授無傳文也則申公雖說詩而無傳文即志又云所載魯詩有魯故二十五卷魯說二十八卷隋志亦云小學有石經魯詩六卷則申公說詩雖有傳文亦苐名魯故魯說魯詩不名詩說即謂魯說即詩說然詩說祗二十四篇無卷次亦並非二十八卷與二十五卷六卷况隋志又云魯詩亡于西晉則雖有傳文而亦已亡之久矣乃或者又曰魯詩亡于西晉則西晉後亡之固已然安知西晉之所亡者不即為明代之所出者耶則又不然夫魯詩至西晉始亡則西晉以前凡漢魏說詩有從魯詩者則必當與今說相合乃漢魏以來說詩不一假如漢杜欽云佩玉晏鳴關雎刺之注云此魯詩也今詩說所載反剽竊匡衡所論如云風詩之首王化之基曽不一云刺詩如劉向列女傳云燕燕夫人定姜之詩或云此魯詩而詩說反襲毛鄭為莊姜戴媯大歸之詩如此者不可勝則今之詩說全非舊之詩故居然可知且舊詩次第見于左傳襄二十九年其時吳季札觀樂以次相及在孔子刪定之前毛傳訓詁傳次第無不吻合此非齊魯韓三家所得異者即小有差殊不過豳王之先後與商魯之存亡已耳今詩說悉與古異有魯風無豳與魯頌而以豳與魯頌合之為魯且又以豳之七月一詩名邠風雜入小雅而以小雅大雅分為正續為傳即風與雅與頌中前後所次又復錯雜倒置與舊乖反然而外此無相合也獨子貢詩傳與此兩書自為輔行為補苴彼倡此和如出一手者申培魯詩宗不聞受學子貢子貢亦不聞授某某為魯學兩相解后比若蛩駏亦可怪矣且其剽竊古說淺薄無理又飾以參差儼若未嘗竊其說者假如孔氏正義謂儀禮歌召南三篇是鵲巢采蘩采蘋越草蟲一篇或者采蘋一篇舊在草蟲之前乎曹氏詩說又謂齊詩先采蘋而後草蟲然要之皆臆說也今兩書采蘋則實在草蟲前矣然又恐人之伺其隱也又以羔羊江有汜兩詩更列之采蘋之前朱子小序辨說于弼之日月有云若果莊姜詩則亦當在莊公之世而列于燕燕之前于終風亦云此當在燕燕前也此即以日月終風兩詩置燕燕前矣然又欲小異也遂使終風又置之日月之前韓詩章句云鼓鐘昭王之時作朝說之時序論亦謂齊魯韓三家以鼓鐘為昭王時詩今鼓鐘則既曰昭王詩矣又云三家以王風為魯詩今亦有魯詩然又故更變焉不以王風為魯詩而以豳魯頌為魯詩歐陽子云七月詩燕齊魯三家皆無之今故以七月為邠風使入小雅劉元城謂韓詩有雨無極篇篇首有雨無其極傷我稼穡八字然先儒謂此書世無傳者且他書不經見也恐亦好事者附㑹者耳今兩書以雨無正詩則竟作雨無極詩誤矣史記孔子世家謂古時三千餘篇孔子定為三百五篇孔氏正義謂史遷之說為謬且云據今詩及亡詩六篇凡有三百一十一篇而史記漢書皆云三百五篇因漢世毛詩不行三家不見詩序故不知六篇亡失則謂三家不以六篇見詩序也今兩書亦遂無六亡詩矣其私據古說原不精博適足以彰其淺陋故或明見魯詩反不能襲偶拾他書所傳或燕齊家則傾以徇之間有更易篇名以見巧異即如鄭詩狡童以史記箕子歌有云彼狡童兮與偶同也遂易名麥秀小雅之圻父以國語圻招詩亦以圻為圻父官相類也易名圻招又鄭詩東門之墠有云豈不爾思子不我即與論語所引唐棣逸詩豈不爾思句又相似遂以東門之墠為唐棣又小雅小宛以國語秦伯賦鳩飛或曰即小宛也則以小宛為鳴鳩齊詩之還以漢書志曰齊地臨淄即營丘故齊詩曰子之營兮乃即以還為營衛詩定之方中以仲梁子曰初立楚宫也遂以定之方中為楚宫大雅之抑以國語左史倚相曰昔衛武年數九十五矣猶針警於國於是作懿戒以自警也遂亦以抑為懿戒凡若此者亦不可數又或者傳之所遺以說補之說之既備傳乃或缺如小雅嘉魚魚麗既詳之傳則說無所解矣大雅民勞桑柔傳既無文則說可考焉又或者各得其半合而得全如小雅頍辨此燕親戚兄弟詩也故詩中亦明云兄弟云甥舅而傳曰燕親戚說曰燕王族必合觀然後得全又或者分舉一義合之而後備如小雅四牡傳曰章使臣之勤則以國語曰四牡君之所以章使臣之勤也說曰勞使臣則以左傳曰四牡君所以勞使臣也則必合觀之乃始得備窺其私智蓋有不可以告人者且其大概多襲朱子集傳而又好旁竊小序又惟恐小序之為朱子所既辨也故從其辨之不甚辨者則間乃襲之否則依傍朱子傳而故為小别然亦十之八九矣則豈有朱子生於百世下上與子貢申培暗吻合者豈朱子陽襲子貢申培書而私掩之不以告人者老學究授生徒市門日煩苦無所自娛乃作此欺世焉其庸罔固陋無少忌憚乃至如此此不可不辨也豫客江介有以詩義相質難者攟托二家言雜為短長豫恐世之終惑其說因于辨論之餘且續為記之世之說詩者可考鑒焉周南五條關雎葛覃詩傳云文王之妃姒氏思得淑女以供內職賦關雎詩說亦云太姒思得淑女以充嬪御之職而供祭祀賔客之事按供祭祀襲毛鄭說彼以荇菜為祭時之菹故云然耳不知供祭祀是后妃事禮記所謂請君之玉女共有敝邑以供祭祀是也安得后妃又思一供祭祀者蓋小序所云思得淑女者是思得后妃不是后妃又思得淑女此係毛鄭誤解小序而此則襲毛鄭之說而又誤之者也且後漢皇后紀序有云康王晏朝關雎作諷舊以為出自魯詩豈有申培魯詩宗而不守已說反襲毛鄭以為解者若其引孔子言關雎樂而不淫哀而不傷又曰心正而后身修身修而后家齊家齊而后國治國治而后天下平則大學出自禮記本漢後儒者所為而四書之彚魯論孟子與大學中庸合為一書則又宋後儒者所為豈有子貢生于春秋預讀禮且預識禮記魯論之必合為一所而連類相引一如今人習四書者此作僞之庸妄蔑略而不自知者也至葛覃詩傳又引子云貴而能勤富而能儉疏而能孝可以觀化矣此數語則直襲朱子集傳已貴而能勤巳富而能儉巳長而敬不弛于師傅已嫁而孝不衰於父母四句而略為更易以成說則豈有子貢襲朱傳者豈有朱傳引子語而不明指為子語者豈有子語而他書不一見者考左傳有貴而能貧又有富而能臣語然皆非此類桃夭詩傳云周人美后妃之德終始婦道賦桃夭子曰宜其家人而後可以教國人見君子之修其身矣按數語出自大學大學一書又出自禮記禮記本吕秦以前戰國以後儒者所為而漢儒集成之故其諸篇各有作者姓氏如吕不韋作月令荀卿作三年問公孫尼子作緇衣子思作中庸類而大學則不知誰作或以為子思窮居在衛作大學中庸則似大學亦子思之書然其說後起終未可信若今人所云孔子之言曾子述之曾子之意門人記之則可怪孰甚天下無相隔二千年一無所據可朗然鑿指為孰是言孰是意孰是述孰是記者即大學果聖人之書亦後儒所作子貢焉能引之即或夫子平日果有是語然子貢所引只是大學何也以宜家教國而復推本之修身則非大學無是語也然則以學究荒陋日讀大學四書而妄云說詩妄云子貢之說詩寃矣麟止詩本是麟之趾惟陸氏釋文云序本或直云麟趾無之字趾本亦作止兩通之此指小序耳而此則竟襲之作麟止且傳說俱然則是子貢申培俱襲小序且俱看注疏讀陸德明釋文豈有此理卷耳按儀禮鄉飲酒禮鄉射禮燕禮皆云合樂周南關雎葛覃卷耳遂歌周南關雎葛覃卷耳則卷耳本周南之三葛覃卷耳本相次在周初制禮時序已如此此故列麟趾之後西洋厯法改畢觜參為畢參觜何足示異耶又朝說之曰魯詩以此為康王時詩詩說作文王遣使求賢而勞之以詩反實指文王不同求賢襲小序兔罝詩說云兔置文王聞太顛閎夭散宜生皆賢人而舉之國史詠其事而美之按墨子云文王舉閎夭太顛于置網之中此或以兔置字偶同故云然作者並不知有墨子豈偶合者與召南六條鵲巢采蘩朝說之曰魯詩以二詩為康王時詩采蘋按儀禮鄉飲酒禮鄉射禮燕禮皆曰合樂召南鵲巢采蘩采蘋則采蘋為召南之三此叙在第五不同又朝說之以此為康王時詩鄒虞詩傳云虞人克舉其職國史美之賦鄒虞詩說云鄒虞美虞人之詩按禮記射義云天子以騶虞為節樂官備也以虞官之備為樂亦猶美虞人克舉職意在歐陽子已先有此說然騶字義又不同賈誼曰騶者文王之囿虞者囿之司獸則獨以虞為虞人而騶固囿名耳若歐陽子說則又以馬御為騶虞官為虞如七騶六騶山虞澤虞之謂則騶與虞皆官名也此獨曰虞人則但以虞為虞官而鄒字無解此襲歐陽子之說而又小變其義者也若騶之為鄒則騶鄒通字三騶子即三鄒子然于此與魯詩有偶合處按文選注引魯詩傳曰古有梁鄒者天子之田也則魯詩亦固以騶為鄒字且亦以騶虞為司獸官又周禮疏引韓魯詩亦謂騶虞天子掌鳥獸官則鄒本田名騶虞官名此不識魯詩而偶合者也然朝說之又謂魯詩以此為康王時詩摽有梅詩說摽有梅女父擇壻之詩按戴岷隱說詩有云此擇壻之辭父母之心也故云然作僞者未必知此野麇行露詩說野麇昏姻惡無禮之詩按毛詩作野有死麕左傳昭元年鄭伯享趙孟子皮賦野有死麕之末章則古無稱野麇者若行露詩傳云野人强昏不得而訟則竟以野麇為野人求昏之物此又本韓詩外傳云一物不具一禮不備則必不肯許諸語故合兩詩為一事以示巧異然亦何必爾甘棠詩傳云召康公勤于勞民燕人懷之賦甘棠詩說亦然按召公以子就封無親出封燕事故左傳晉士鞅曰武子之德在民猶周人之思召公其云周人則正以召公不親至燕故也若鄭志答張逸云甘棠稱召伯固知在武王時夫武王時則固在封燕後然至燕則不然耳或曰九域志召公甘棠在陜州府署括地志又云洛州夀安縣有召伯廟為召伯聽訟甘棠之所則皆後人附㑹無足據者魯朱傳曰或曰魯無風何也曰先儒以為時王褒周公之後比乎先代故巡狩不陳其詩而其篇策不列于太師之職是以宋魯俱無風也或謂夫子有所諱而削之則左氏所記當時列國大夫賦詩及吳季子觀周樂皆無稱魯風者其說不得通矣今按孟子及他書引詩皆稱魯頌則在當時已如此更名為風兒童之詐也此無豳風以七月一詩為小雅而以鴟梟下六詩及鄘定之方中一詩更名楚宫合魯頌四詩共十一篇為魯風傳說同鴟梟詩傳云周公孫于魯殷人畔公憂王室勸修王政以備之賦鴟梟詩說云管叔及其羣弟流言于國周公避居于魯殷王祿父遂與十七國作亂周公憂之作此詩以貽成王欲王省悟以備殷全篇以鳥之育子成巢者比先王之創業而代之為言也按周公居東居國之東耳故尚書金縢篇王發金縢後執書以泣乃曰肆豫小子其親迎以公時居國之東故可親迎若是居魯豈有以西岐至東魯迎公之理若殷人畔則當在賦鴟梟後所謂未雨綢繆者慮其畔耳故書序注云公還攝懼誅故畔此是實録若既畔則斧破戕缺尚何未雨預防之有狼跋詩說曰狼跋周公居于魯魯人睹其德容而作是詩按詩句公孫碩膚德音不瑕嘗見舊本孔鮒小爾雅引此二句作德容不瑕見成王美大聲稱逺也以德音為德容本傳寫誤耳此曰睹其德容豈亦偶見小爾雅誤本故以音字改容字耶破斧詩說云破斧周公至自征殷四國美之考詩文每稱四國皆四方之國如曹風正是四國耳此曰四國美之則實指四國矣按鄭箋曰四國管蔡商奄也然觀此傳於邶之柏舟亦有曰四國害周公則又似以管蔡霍殷為四國與鄭稍異楚宫詩傳云僖公城楚丘以備戎史克頌之賦楚宫詩說同按詩中無楚宫名疑即鄘詩定之方中一篇以詩中有作于楚宫語遂易名置此觀鄘詩無定之方中一篇可知也但考魯無城楚丘事唯春秋僖公二年春王正月城楚丘然此是衛事非魯事也且備戎與備狄不同按春秋隱七年戎伐凡伯于楚丘此楚丘亦指衛地然隱七年是備戎僖二年是備狄以狄是時方滅衛而文公復之故城楚丘為備狄也作僞者不知戎狄二字亦有關係遂洵筆亂下而不知其不可耳若衛文作室則與城楚丘無與觀詩中並無一語及築城事居然可知且定之方中為營室初正中時為十月中氣春秋城楚丘文乃在僖二年春衛文固先於城楚丘一月預營度宫室故詩辭與春秋城楚丘時不合若謂此詩即城楚丘則毋論此詩是衛文非魯僖即是魯僖亦營室正中時與春王正月了不相涉也考朱傳魯頌駉篇注有云衛文公秉心塞淵而騋牝三千亦此意也此必因朱子此語遂附㑹作魯詩耳又毛傳仲梁子曰初立楚宫也正義曰鄭志答張逸問仲梁子何時人答曰先師魯人當六國時在毛公前則仲梁子本魯人其曰初立楚宫不繫某國號者意必以本國事故直言之如春秋書初獻初稅例則舊亦有以此為魯國事者但作僞者定不曉此史克作頌襲小序駉篇語泮水泮宫詩傳僖公獻捷于太廟史克闕賦泮水詩說泮宫僖公作泮宫而落其成太史克頌禱之詞詩本名泮水以中有既作泮宫語别名泮宫示異也其云獻捷亦以詩中有在泮獻馘既克淮夷語但此皆頌禱詞不必實事古者出兵受成于學及其反也以訊馘告故及獻馘耳僖公原無伐淮夷事伐且無有焉得獻馘按春秋僖十三年公㑹諸侯于鹹為淮夷病把也十六年鄫亦為淮夷所病㑹于淮謀鄫然皆齊桓事僖公不過遵齊一隨行耳且亦未嘗伐淮夷也唯通鑑外紀有云周襄王八年冬僖公㑹諸侯於淮上謀東略未幾遂伐淮夷按周襄八年即僖之十六年謀東略即十六年㑹淮事以左傳云謀東略故也彼必從此語增飾之者然非實録也且其所云太廟亦無據詩所頌者泮宫耳天子辟雍諸侯泮宫泮宫是學太廟是宗廟唯蔡雍月令論有明堂即太廟太學之說然晉袁凖辨之謂宗廟之中鬼神所居使衆學處焉饗射于中人鬼慢黷死生交錯囚俘截耳瘡痍流血非其理也此正辨太學太廟不得相混若僖公獻捷謂在太廟則正中其說事有為前古所既辨者乃復取擾焉何也閟宫詩傳云僖公八年始用郊禘史克闕賦閟宫詩說閟宫魯僖公新作后稷文王之廟于太廟世室及孝惠桓莊四寴廟之上而史克作詩以頌之非孔子所録也據春秋僖八年秋七月禘于太廟故此鑿然曰僖八年始用郊禘不知此時雖禘然非始禘也前此閔二年即有曰禘于莊公矣此時雖禘亦不及郊後此僖三十一年然後曰四卜郊矣禘即冒取郊乃預支况詩中亦明云秋而載嘗並不及禘也若僖公作后稷文王廟則更無據徒以詩中頌后稷文王故云然不知后稷文王亦特修廟時頌及之非為作新廟頌也若頌作新廟則詩中又有太王武王宜增二廟矣春秋興作雖小必書况作廟大事不書必無此事耳且詩傳云始用郊禘詩說云作后稷文王廟彼此發明意謂郊必須后稷禘必須文王不知郊雖配稷不必立廟若謂魯之禘必禘周公所自出故須立文王廟則天子之禘亦禘后稷所自出矣未聞於九廟之上復立帝嚳廟也即必為立廟則前此亦有禘矣何以至僖始立耶又按公羊傳云周公稱太廟魯公稱世室羣公稱宫則此云閟宫意必即羣公廟也又云立閟宫於羣公廟上豈可通乎朱傳曰閟宫一篇為僖公之詩夫以其詩之僭如此然夫子猶録之者因其實而著之是非得失自有不可掩也此曰非孔子所録正暗竊朱子說而回護之耳則豈有孔子亡後增入此詩者凡此皆妄也詩傳詩說駁義卷一
