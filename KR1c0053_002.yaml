body:
  text: 詩傳詩説駁義卷二翰林院檢討毛竒齡撰邶舊以衛詩為弼鄘衛固不可解此則以弼為管叔時詩以鄘為霍叔時詩以衛為衛武公以後詩凡詩中明明可據是衛詩者則皆入于衛餘皆雜入弼鄘按漢書地理志云鄁以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷謂之三監其説固謬三監者管蔡霍也若去霍叔入武庚是二監矣若武庚亦一監則武庚監武庚矣此由漢儒誤以書康誥諸篇為成王誅武庚後始封康叔而以衛為蔡叔舊封故云然然未嘗言弼是管鄘是霍也考書蔡仲之命蔡叔封蔡故稱蔡則管霍亦必以封管霍地故稱管霍此瞭然者特不知所在耳若詩傳于弼柏舟詩又云管叔封于弼與蔡叔霍叔康叔監殷是管蔡霍三監之外又增一康叔則又是四監漢書少一監此多一監俱不可解若鄭譜云武王伐紂以其京師封紂子武庚為殷後乃三分其地置三監使管叔蔡叔霍叔尹而教之亦未言弼鄘為管霍封地弼鄘詩為管霍時詩至于左傳載季子觀樂則于歌邶鄘衛時統曰吾聞衛康叔武公之德如是是其衛風乎則明明以弼鄘衛同是衛風此則弼鄘皆為衛不為管霍之明證也或曰管即鄭州管城蔡即蔡州上蔡霍即晉州霍邑則又後人附會之言不足據者柏舟詩傳管叔封于弼與蔡叔霍叔康叔監殷四國害周公康叔諫不聽三叔遂以殷畔康叔憂王室賦柏舟子曰仁矣吾于柏舟見匹夫不可奪志也詩説柏舟康叔因管叔欲害周公挾武庚以叛憂之而作按書梓材篇有云王啓監厥亂為民此是誥康叔者則疑康叔亦監殷似亦有説特于三監之數不合耳至子曰以下所引子言無據按孔叢子記義篇有曰于柏舟見匹婦執志之不易也詳其語似言鄘柏舟非此柏舟也即此柏舟亦必因列女傳云柏舟衛宣夫人守志之詩是婦人詩此誤以婦字作夫字則必偶見孔叢子鏤本或誤此字遂造康叔事而引此言以實之以為孔叢子現在可暗取證而不知以婦人為男子以雌為雄所謂撲搠迷離不辨雄雌也則何可已鄘四條牆有茨詩傳云三叔冓周公鄘人風之賦牆有茨詩説亦然按漢書注云中冓魯詩以為中夜也此以中冓為中搆與魯詩不同考槃詩傳鄘人美其君子不仕亂邦賦考槃子曰見遁世而無悶矣此竊孔叢子云於考槃見士之遁世而不悶也語觀此則益信柏舟匹夫不可奪志亦正引孔叢子語而連篇以及之者作偽之稚拙而底裏盡見有如此後木瓜篇同木瓜詩傳朋友相贈賦木瓜子曰見苞苴之禮行焉子曰以下見孔叢子於木瓜見包苴之禮行也語餘見前芄蘭詩説芄蘭刺霍叔也以童子僭成人之服比其不度德量力而助武庚亂胡胤嘉云據竹書謂成王十年武庚畔是時霍叔已五十有四非童子矣衛十條淇澳詩傳云衛武公好學明德國人美之賦淇澳按詩文淇奧惟大學作淇澳此故改澳字且加明德字則竟以大學釋詩矣禮記出漢後豈能遷易詩文如此况禮記原本原以淇奧詩證誠意在故君子必誠其意後未嘗證明德也證明德之説創自朱子以此節為明德之止于至善此是臆解耳而作偽者公然入此二字淺學不審量以為本之大學而不知此大學係朱子之大學非禮記大學也觀此則其書為宋後明季學究授市門幼稚于鄉孰而發狂為此夫何疑焉菉衣詩傳衛莊公之嬖人生州吁好兵莊薑憂之賦菉衣考緑字原有作菉字者如小雅采緑楚辭注引之作采菉淇澳緑竹大學引之作菉竹是也但菉竹二草名緑菉亦二草名故可通見未有緑是色而亦作菉者豈菉衣草衣與作偽無學不知緑菉通見之故以為菉緑可通遂雜下而不知怪悲夫燕燕詩説燕燕莊薑與娣戴媯皆為州吁所逐同出衛野而别莊薑作詩詩云逺送于野未有同被逐而稱逺送者若魯詩則宜以此為衛夫人定薑之詩擊鼓詩傳州吁求寵于諸侯使公孫文仲帥師及宋公魯人蔡人伐鄭衛人怨之賦擊鼓詩説同按州吁好兵見左傳以此詩為刺州吁見小序與朱子集注獨豫以為未必是刺州吁者據左傳隱四年州吁以諸侯之兵伐鄭圍鄭東門只五日耳秋又伐鄭取禾而還九月州吁即見殺亦不及一月耳夫州吁好兵止于伐鄭即伐鄭又止于隱公四年之一年即一年之間又止于此數日安得有不我以歸爰居爰處生死契濶至不可活不可申如是之久况隱四年州吁已見殺至僖二年戴公始廬漕因漕無城文公又復城楚丘安得州吁有城漕之事豫嘗謂朱注不遵小序其遵小序處則愈見悖謬此亦其一若左傳州吁伐鄭有陳人蔡人即詩文亦有平陳與宋語此獨去陳人不知何據又從孫子仲稱公孫文仲亦無據親臺詩傳衛宣公納伋之妻國人惡之賦親臺詩説寴臺衛宣公為伋取婦而美築寴臺而自納之衛人惡之而賦其事也按古新字與親字不通自程伊川改大學以親民為新民此遂竊其説改作親字考新臺以莘地得名即左傳公使伋之齊使盜待于莘之莘則以莘為新矣此又以新為親又以親為寴展轉貽誤豈子貢亦曾讀程子改本大學過耶二子乘舟詩傳宣公殺其世子伋及母弟壽衛人傷之賦二子乘舟詩説二子乘舟宣公欲立少子朔使伋夀如齊而沉之于河衛人傷之而作是詩按左傳初宣公蒸于夷薑生急子為之取于齊而美公取之生夀及朔夷薑縊宣薑與公子朔搆急子公使諸齊使盜待諸莘將殺之夀子告之使行不可曰棄父之命惡用子矣及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之史記亦云宣公正夫人與朔惡太子伋宣公自以其奪太子伋妻也心惡太子欲廢之及聞其惡大怒乃使於齊與之白旄而令盜遮界上殺之是公獨惡伋使伋死夀以代伋故並死耳未嘗並使夀死也今曰欲立朔而並殺二子于事不合且其所謂沉于河者並無所據唯劉向新序云宣公欲殺太子伋而立壽也使人與伋乘舟于河中將沉而殺之夀知不能止也因與之同舟舟人不得殺伋方乘舟時伋傅母恐其死也閔而作詩其後舟行無恙未幾又使伋之齊將使盜見載旌要而殺之夀止伋伋不可夀又與之偕行夀之母知不能止也戒之曰夀無為前也夀又竊伋旌以先行幾及齊矣盜見而殺之伋至見夀死痛其代已死涕泣悲哀遂載其尸還至境自殺據新序説則實有沉河事且實有二子乘舟事然欲立夀而殺伋則非欲並殺伋夀欲沉河不能而又使之齊而殺之于路則非使如齊而沉於河其援據不實多致乖舛固不待言豫獨謂劉向所記亦傅會詩文不可盡信者齊衛隔一河二子未渡河而死于莘矣莘在衛東近河水經注云今平陽陽平縣北一十里有故莘亭道是衛適齊道也宣公築臺河上要取齊女亦即此地其名曰新臺以新莘聲同故也史記曰死界上正謂衛與齊之界也二子死莘死界上未嘗渡河則與二子乘舟之語不合故造為使伋乘舟之事以實之然而乘舟何事使乘何為既不奉使又非遊遨造飾之言彌見兀臬即曰傅母恐伋死閔而作詩亦但閔伋耳焉知夀往而頓稱二子尤屬無理故吾謂劉向是記亦增飾詩文未可遽信若作偽之謬則固有不足辨者又伋與夀異母弟詩傳稱母弟非是采唐詩傳公室無禮國人刺之賦采唐詩説亦然按此詩本名桑中以章首有爰采唐矣句因改之示異但左傳申公巫臣聘夏姬于鄭盡室以行申叔跪遇之曰異哉夫子有三軍之懼而又有桑中之喜注曰桑中衛詩名則當時稱桑中名已久恐無稱采唐者泉水詩傳宋桓姬閔衛之破也賦泉水詩説同按宋桓姬無可考唯小序河廣篇有桓姬歸衛事然此時未知在衛與否此但以許穆夫人賦載馳則宋桓夫人不得不賦泉水耳餘見後河廣詩河廣詩傳宋桓姬歸于衛思襄公賦河廣詩説河廣宋桓夫人生襄公而出歸于衛襄公即位夫人思之而義不可往故作此詩按宋桓姬歸衛事他無可考惟小序云宋襄公母歸于衛思而不止故作是詩考衛未遷時衛都朝歌在河北宋都睢陽在河南則相隔一河故在衛思宋則賦河廣至宋襄立時衛已渡河都河南矣當衛戴公初渡河時宋桓為逆河霄濟爾時宋桓尚在也至渡河之後衛文公十年而桓始亡桓始亡而襄始立則宋襄即位距衛渡河時已十年有餘即使桓姬果歸衛果思子爾時已不隔河矣尚曰誰謂河廣誰謂宋逺于情理不合故豫向謂此詩未必是宋桓夫人思子之詩非無謂也苐嚴華谷作詩緝謂此詩當在衛未渡河襄公未立之前此亦回護河廣之一説然嘗考劉向説苑宋襄公為太子時請桓公立目夷公問故對曰臣有舅在衛愛臣若終立則不可以往是襄公未立時嘗得借省舅之意依母在衛惟恐既立則難往故預為辭立則是桓姬思子斷當在襄公既立之後故此曰襄公即位夫人思之似亦有見然而襄公既立則衛已渡河有何河廣則此河廣詩謂桓姬思子終是疑案豫作聞詩説辭已載其説因此有襄公即位數語似竊見説苑而為言者故復記此蝃蝀詩傳衛靈公召子都于宋國人譏之賦蝃蝀詩説蝃蝀衛靈公為南子召宋朝國人譏之按靈公在春秋末昭定公時左傳襄二十九年季札觀樂時已歌鄘矣豈夫子刪詩時復增入此一詩耶考鄭氏詩譜時世止于周敬王時此可據者若靈公所召者宋朝也詩傳稱子都詩説稱宋朝豈謂宋朝即子都耶孟子注云子都古男子美稱即鄭詩已有不見子都句在靈公前王五條黍離詩傳云王世子宜臼弒其君幽王自立于雒尹伯封過西都而傷之作黍離詩説云黍離幽王伐申申侯逆戰于戲射王弒之立平王于申自申遷雒命秦伯帥師逐犬戎于鎬京尋遣尹伯封犒秦伯之師過故宗廟宫室秦人皆墾土為田咸生禾黍旁皇不忍去故作此詩按尹伯封他無考唯韓詩云黍離伯封作但韓詩所云伯封另是一事嘗讀曹植令禽惡鳥論云尹吉甫信後妻之讒殺孝子伯竒其弟伯封求而不得作黍離詩此韓詩之説則此伯封是伯竒之弟求兄不得故作此詩非謂過都傷感如箕子所云也此既襲尹伯封名而又以為過故宫所作是既據韓詩又據小序相雜成説謬矣若劉向新序又云衛宣公子夀閔伋見害作憂思之詩黍離是也則同是以弟求兄而又異其名古人記事多此類􅭅之水詩傳荆伐申平王以周師戍申周人怨之賦􅭅之水詩説􅭅之水荆子討申侯弒幽王之罪伐申侵甫及許平王遣兵戍之周人怨思而作按古文無􅭅字此與鄭風唐風皆改揚字為􅭅字不知何據若荆伐申則似竊鄭箋云申近強楚數見侵伐二語而竟造事以實之然亦但戍申耳以詩有戍甫戍許并造為伐甫侵許則此時祗申侯焉得復有甫許諸舅氏也考國語富辰曰齊申許吕皆繇大薑則以四國皆薑姓可通稱孔氏正義云戍申而曰甫許猶六國秦趙俱嬴姓史記漢書多稱秦為趙是也若許甫稱許吕則吕即甫字書吕刑即甫刑可見何彼穠矣詩説何彼穠矣齊襄公殺魯桓公莊王將平之使榮叔錫桓公命因使莊公主婚以桓王之妹嫁襄公周人傷之而作是詩按何彼穠矣本王姬降齊襄事原不宜入召南然謂莊王為齊襄魯莊之隟以此平之則不然莊王以桓王妹下嫁齊襄豈為平魯即其使魯主之亦如公羊傳所云天子嫁女于諸侯必使同姓諸侯主之故然耳豈有王姬下降宗國主嫁僅作諸侯相平之具此皆臆見之可笑者又按齊魯韓三家詩謂齊侯嫁女以其母王姬治嫁之車逺送之則言嫁用王姬車耳非嫁王姬也申公魯詩其為説在三家外亦不可解徐仲山曰此詩有二齊侯子一是齊襄一是小白皆取王姬者有謂是襄非小白以小白本僖之庶子襄之諸弟不得稱齊侯之子云耳然有謂非齊襄者春秋莊元年夏單伯逆王姬秋築王姬之館于外冬王姬歸于齊此齊襄事也歷夏秋冬三時而皆不得有唐棣華可謂齊襄乎豫曰不然唐棣興也霜降而逆女冰泮而殺止周制也桃之夭夭豈逆女時耶興也唐棟詩傳曰王棄賢大夫風之賦唐棣詩説唐棣僖王棄賢而諷之首章興也二章三章賦也按詩無此名唯豐坊偽詩本以論語唐棣之華四句冠鄭風東門之墠詩上而此詩傳詩説又皆無鄭東門之墠一詩則亦以鄭東門之墠一詩冠論語唐棣四句為唐棣詩耳唐棣詩豈不爾思室是逺而與東門之墠其室則邇其人甚逺豈不爾思子不我即語本相似然唐棣室逺東門之墠室邇亦正相反若東門之墠只二章此曰二章三章正加四句作一章也豐氏郭氏其互相作偽如此有兔詩傳萇𢎞忠于王晉趙鞅殺之周人傷之賦有兔詩説同按左傳哀三年晉趙鞅惡范氏與周劉氏世為婚姻萇𢎞事劉文公趙鞅責周與范氏故周人殺萇𢎞是其事也𢎞殺非其罪與兔爰合但哀三年事當在孔子刪詩之後恐時世或不符耳詩舊名兔爰不名有兔詩傳詩説駁義卷二
