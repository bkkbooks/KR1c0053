body:
  text: 詩傳詩說駁義卷三翰林院檢討毛竒齡撰齊八條營詩傳齊俗習于田賦營詩說同按詩本作還漢書地理志云臨淄名營丘故齊詩曰子之營兮遭我呼嶩之間兮顔師古謂毛詩作還齊詩作營故此亦以還為營但子貢說詩不知所主申培魯詩宗又襲齊詩何也或曰營既是地則下章子之昌子之茂又作何解後見賈逵齊魯韓毛氏異同及崔靈恩集注有云昌茂亦齊地後好事者直云營丘故城即濰之昌樂茂即泰山之牟牟茂通丰詩傳公子小白適營齊人慕之賦丰詩說亦然此鄭詩也入此者必以詩中子之昌兮與前還詩語同俟我于堂又與後著詩語同故耳如王風采葛篇有一日不見如三月兮語鄭風子襟篇亦有是二語遂以子襟為王風其譎祕皆此類南山詩傳襄公留姜氏于齊魯桓公不能制齊人刺之賦南山詩說南山襄公久留文姜齊人刺之按春秋公與夫人如齊公即薨于齊無久留而公不能制之事若焦氏易林云襄送季女至于蕩道齊子旦夕留連久處則指文姜初歸魯時故曰襄送季女如春秋齊侯送姜氏于歡是也苐歡非蕩道送姜氏者是齊僖不是齊襄焦氏故誤耳載驅詩傳襄公伐衛姜氏㑹之于師賦載驅詩說載驅齊襄納衛朔抗王人魯人從之文姜歸齊以犒師齊人刺之按春秋莊五年春夫人姜氏如齊師冬公㑹齊人伐衛則伐衛冬時事夫人如齊師在春非伐衛時或齊更有師則不可必耳若胡氏傳引此詩證如師事曰彭彭多貌儦儦衆貌亦引詩數姜往事如此非謂此詩即如師時作也至于伐衛為納朔公羊傳曰伐衛納朔也乃一事而彼此分見詩傳曰伐衛詩說曰納朔作僞之故為賣弄乃爾猗嗟詩傳魯莊公㑹齊大夫狩于禚齊人譏之賦猗嗟詩說猗嗟魯莊公朝于齊遂及齊大夫狩禚齊人刺之賦也按莊公無朝齊事唯狩禚有之然是齊侯非齊大夫春秋莊四年公及齊人狩于禚公羊傳云公曷乎與微者狩齊侯也齊侯則其稱人何諱與讐狩也榖梁傳亦云齊人者齊侯也其曰人何也卑公之敵所以卑公也則狩禚為齊侯非齊大夫矣若其以此詩為狩禚詩者徒以詩中有射則臧兮終日射侯諸語耳然曰射侯曰不出正則明是樹侯以射非狩也按射禮大射以皮賔射以正燕射以獸此曰正正是賓射與兩君相見禮合則以此詩為狩亦非是風雨詩傳齊桓公相管仲以匡天下齊人美之賦風雨詩說同按左傳昭十六年鄭六卿餞韓宣子于郊宣子曰二三君子請皆賦起亦以知鄭志子游賦風雨宣子喜曰賦不出鄭志則明是鄭詩而乃移入齊作僞之不審量如此雞鳴詩傳桓公好內衛姬針之賦雞鳴詩說雞鳴衛姬勸桓公以勤政故作此詩按劉向列女傳云桓公好淫樂衛姬為之不聽鄭衛之音桓公乃立衛姬為夫人號管仲為仲父曰夫人治內管仲治外張華女史針亦曰衛女矯桓耳志和音是也但劉向是說有未可信者按左傳齊侯好內多內寵內嬖如夫人六人長衛姬生武孟少衛姬生惠公則二衛姬亦皆在所嬖之數未聞有特稱賢者及鄭姬生孝公公與管仲屬孝公子宋襄公以為太子雍巫有寵于共姬因寺人貂以薦羞于公公許之立武孟管仲卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋按雍巫即易牙共姬即衛姬公子無虧即武孟則長衛姬之不賢有明徴矣浸假少衛姬賢與管仲同治內外則安得有私寵鄭姬陰與管仲屬太子于宋之事所謂衛姬治內管仲治外者安在故曰劉向之言亦不無可疑者然作僞如此節則猶屬有據者也甫田詩傳景公欲求諸侯大夫風之賦甫田詩說甫田齊景公急于圖伯大夫諷之按小序云大夫刺襄公不修德而求諸侯則求諸侯本襲小序特以景公易襄公耳若景公圖伯無據按左傳昭十一年晉侯與齊侯投壺齊侯祝辭有曰與君代興士文伯謂齊侯欲代晉興伯則所云圖伯意或有之然作僞者定見不及此魏二條十畝之間詩說十畝之間政亂國危賢者不樂仕于其朝而思與友歸于農畝賦也此全是朱傳文豈申公讀朱氏傳耶抑朱傳引魯詩陰竊之不告所自耶觀者思之碩鼠詩說碩鼠大夫貪戾魏人怨之而作是詩按詩文但刺貪耳其鑿指大夫者緣小序云刺其重斂而朱子辨說云此亦託于碩鼠以刺其有司之詞未必直以碩鼠比其君也故此舍刺君而曰刺大夫耳舊以寧戚扣角歌碩鼠按古詩最多或别有碩鼠非此詩唐三條山有樞詩說山有樞唐人憂國之詩按魯詩石經殘碑作山有蓲申公魯詩何以非蓲字耶茮聊詩傳菽聊詩說詩本作椒惟說文以椒為茮若作菽是采菽之菽大豆也以叔作叔遂以茮作菽誤矣野有蔓草詩傳臼季遇郤缺于冀野薦于文公缺一字人美之賦野有蔓草詩說同按此是鄭風以臼季遇郤缺事相似遂移置此耳考左傳鄭子齹賦野有蔓草韓宣子曰賦不出鄭志則明係鄭風之有左證者而移為唐風何鹵莽也曺一條尸鳩按詩本作鳲鳩惟漢書說苑作尸鳩尸鳲同鄶二條按左傳季札觀樂曰自鄶以下故陸德明釋文亦云檜本又作鄶若諸家皆作檜非鄶也此從鄶者必幼時讀觀樂一篇耳大路詩傳鄶人夫婦相棄缺四字賦大路詩說同此鄭風也按宋玉登徒子好色賦有曰鄭衛溱洧之間羣女出桑臣觀其麗者因稱詩曰遵大路兮攬子袪贈以芳華辭甚妙則以此詩本鄭詩故曰溱洧之間此入鄶妄矣又遵大路去一遵字亦不可解鄭四條緇衣詩傳鄭武公養賢而賦緇衣子曰於緇衣見好賢之至也按武公時世襲小序於緇衣句見孔叢子說見弼柏舟篇扶胥詩傳鄭靈公棄其世臣而任狂狡子良憂之作扶胥狂氏狡名詩說亦然按詩本作扶蘇唯毛傳作扶胥胥蘇通字其曰任嬖人狂狡者按左傳宣二年鄭公子歸生受命于楚伐宋宋師敗績狂狡輅鄭人鄭人入于井倒㦸而出之獲狂狡則狂狡本宋人而見獲于鄭者其後任狂狡則無所據且獲狂狡者亦鄭穆公非靈公也此以狂狡二字偶同故實之耳麥秀詩傳子良諫用狂狡靈公不聽將去其國賦麥秀詩說麥秀靈公不聽子良之諫將逐之故作是詩以責狂狡一章興也二章賦也按詩無麥秀篇唯史記箕子有麥秀歌中有彼狡童兮二句與此狡童詩句相合即以狡童為麥秀觀狡童詩止二章而詩說有三章其云一章興者必即以麥秀歌四句移冠此章如論語唐棣之華四句移冠東門之墠詩其詐同也若子良將去國靈公逐子良則尤不然按左傳鄭公子歸生弒靈公鄭人立子良子良辭乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡則亦皆亡乃舍之皆為大夫則是襄公將去穆氏而獨留子良此謂子良欲去國又云靈公欲逐子良皆依俙附會不可信者且春秋宣三年冬鄭穆公卒四年春靈公始立夏六月鄭公子歸生弒其君夷是靈公立祗半載而即已被弒即嬖狂狡亦不久子良安得數數進諫且至去國後褰裳詩傳竟云子良去國詩說則又鑿鑿云子良如晉此皆誕妄不經之已甚者羔求詩傳子皮為政忠直文武子産美之賦羔求詩說羔求鄭子皮卒子産思之追頌焉賦也按左傳鄭六卿餞韓宣子子産賦羔裘則此詩先子産有之故子産取以為賦非子産所作明矣朱子小序辨說有云當時鄭之大夫如子皮子産之徒豈無可以當此詩者故此即以子産美子皮實之其欲竊附朱子而遂忘前此之有左傳亦可嘆也求字見前陳一條墓門詩說墓門泄冶諌靈公孔寧儀行父譖而囚之冶作是詩按左傳陳靈公與孔寧儀行父通于夏姬皆衷其衵服以戲于朝泄冶諫公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶無譖泄冶事若詩云國人知之則與榖梁傳泄冶入諫曰使國人聞之則猶可使仁人聞之則不可語亦相類秦六條詩終秦風豈亦尚書終秦誓之意耶車鄰詩傳襄公伐戎初命為秦伯國人榮之賦車鄰詩說亦然按車鄰朱傳作車𥻘不知何據此從毛傳是也但襄公時世不可考據小序云車鄰美秦仲也而安成劉氏謂秦仲但為宣王大夫未必得備寺人之官此詩疑作于平王命襄公為侯之後此皆宋儒臆見而子貢申培已先得我心真可一笑終南詩傳襄公克戎始取周地秦人矜之賦終南詩說同此襲小序然歐陽子曰周雖以岐豐賜秦使自攻取然襄公止以一兵至岐至文公始逐戎而取岐豐之地此詩及終南則非襄公時可知也終南岐地山名在今陜西西安府駟驖詩傳襄公始有田囿之事秦人喜之賦駟驖按小序曰始有田狩之事園囿之樂此即竊摘其二字以櫽括之其作僞有如此者渭陽詩傳晉重耳入于晉秦穆公送之賦渭陽詩說同按左傳秦穆姬為晉獻公太子申生之同母姊為重耳異母姊穆姬生太子瑩是為康公則康公為重耳甥故稱舅氏若秦穆與重耳特妻之弟耳未聞妻兄弟稱舅氏者作僞之不典如此黃鳥詩傳康公葬穆公以子車氏三子殉秦人哀之賦黃鳥詩說黃鳥秦穆公卒世子罃以三良殉之秦人傷之而作是詩按子車之殉歸咎康公此即魏顆陳乾昔子從治命不從亂命之說然考左傳文六年秦伯任好卒以奄息仲行針虎為殉君子曰秦穆之不為盟主也宜哉死而棄民玩左氏文則當時皆歸罪穆公不及康公以康公不得主之故也故應劭云秦穆公與羣臣飲酒酣言曰生共此樂死共此哀于是奄息仲行針虎許諾及公薨皆從死則當時秦穆令從已死而三子輕生爭自為殉固非嗣主意即嗣主亦不得禁止之故鄭箋云從死自殺以從死孔氏正義云不刺康公而刺穆公者是穆公命從已死此臣自殺從之非後主之過則是子車之殉其必責穆公而不責康公者已早有成論而作僞鹵莽凡前人所顯然論列無庸翻復者必盲犯瞎觸以墮其說則猥陋甚矣至若李德裕云三良者所謂殉榮樂也非所謂殉仁義也可與梁丘據安陵君同譏矣安得謂之百夫特哉則文饒之意并將罪三良以薄穆公之過况康公乎或曰三子輕死記載有之然與詩文臨穴惴惴之意似于不合天下無輕生而尚股栗者則又不然臨穴者秦人也惴惴其栗者秦人之傷之也故鄭箋云秦人哀傷之皆臨穴而為之悼栗則惴惴者在秦人不在三良又甚明者若秦本紀云穆公葬于雍從死者百七十人此雖不可信然亦秦俗如是如是則又何必惴何必臨穴且亦何必論其孰有罪孰無罪若者宜原若者宜坐而必出穆公而入康公亦多事矣詩傳詩說駁義卷三
