body:
  text: 詩傳詩説駁義卷四翰林院檢討毛竒齡撰小正總一條條詩傳全詩説四小雅大雅止二則季札觀樂曰為之歌小雅為之歌大雅是也今詩傳詩説分小雅小雅續小雅傳大雅亦然按鄭譜有小大雅正變説自鹿鳴至菁菁者莪十六篇為正小雅自文王至卷阿十八篇為正大雅餘變雅也諸家皆宗之獨鄭漁仲曰正變之説不出于夫子未可也小雅節南山之刺大雅勞民之刺謂之變雅可也若鴻雁庭燎之美宣王嵩高蒸民之美宣王亦謂之變可乎嗣後説詩家遂有不從其説者今詩傳詩説不名正變而改名續名傳此附鄭樵説也然其名為傳者則仍附康成之説而參以宋人者康成謂小雅十六篇大雅十八篇謂之正經而孔氏正義即謂凡書非正經者皆謂之傳然未知此傳在何書也則雖謂有傳而未嘗以變小大雅詩當之至東萊吕氏則謂楚辭惟屈原離騷則謂之經自宋玉九辨以下皆謂之傳以此例推之則鹿鳴以下小雅之經也六月以下小雅之傳也文王以下大雅之經也民勞以下大雅之傳也此亦是宋儒習氣好創臆説強為解斷而此即公然以變雅為傳則豈有端木賜申培皆得聞鄭樵孔頴達吕祖謙之言而為説詩者真可怪也又孔氏正義謂古詩三百五篇無三百十一篇緣三家舊本無六亡詩故也此云無者言有詩而刪去之非無詩也申培魯詩固宜去此六詩子貢何詩宗而亦復去此且六詩亦以被笙之故偶軼其字句未嘗無詩天下無無詩而有題者亦無無詩而可以笙者惟朱子臆斷妄謂此六笙詩者有聲無詩而此即去之夫古不著易遽稱連山王不作賦得名禹貢世無此理况詩題非他皆摘詩中字標以為題如關雎者以詩有關關雎鳩一句故名關雎葛覃者以詩有葛之覃兮一句故名葛覃非如漢後詩家另標一題以作詩可以詩是詩題是題也假使無詩題將安出且亦何所見何所取義可妄曰南陔曰華黍曰崇丘曰由儀此皆悖理之已甚者如由庚由儀本字無義此正截取詩詞之字不然是狂悖矣若金元樂府雖另立題然皆有詞即題亦皆有義無無義者况古有徒歌並無徒樂縱有徒樂如後世吹角吹箎等亦皆有辭存于其中况堂堂大樂燕享酬報即徒歌尚不可豈有虛吹虛打如時俗嫁娶之理無怪乎近代彈琴家祖嵩陽道士邪説以為琴貴無辭遂失摶拊以詠之本來而不之察也二書猥陋原不足以語此因論小雅六亡詩而偶然及之凡觀經者慎毋狃宋人之説而亡古義斯幸幸耳詩傳云周公制作禮樂用之燕享有小正焉缺一字鶴鳴缺二字所以修身也缺一字鹿鳴伐木菁莪隰桑白駒皆所以燕賢也棠棣燕兄弟也頍燕寴戚也魚麗嘉魚瓠葉皆所以燕大臣也南山有薹天保大臣所以報王也煌華遣使臣也四牡勞使臣之勤也枤杜勞戍也邠風陳農政也南山楚茨甫田皆所以勸農也大田農夫所以報公也斯干落寴宫也鴻雁懷逺人也蓼蕭常常者華湛露彤弓桑鳸采叔皆天子之燕諸侯也瞻彼洛矣鴛鴦魚藻皆諸侯所以報天子也子曰凡為天下國家有九經修身則道立尊賢則不惑寴寴則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之斯周道之所以正乎用之燕享有小雅焉與後大雅云會朝受缺一字有大雅焉皆襲朱傳正小雅燕享之樂正大雅會朝之樂受釐陳戒之辭語其受下缺一字必釐字也菁莪本作菁菁者莪按左傳文三年晉侯賦菁菁者莪又昭十七年小邾穆公賦菁菁者莪古無單名菁莪者至于鹿鳴以下篇次則儀禮燕禮云工歌鹿鳴四牡皇皇者華鄉飲酒禮亦然又學記云大學始教宵雅肄三注云三即鹿鳴四牡皇皇者華三詩則此三詩皆一定之序如天地玄黃之排字隨所編次更不篡易故但舉三字而人人知之鮮所紊亂若可以意為先後則倘曰工歌鹿鳴之三而此以菁莪應之是亂道矣作偽之不學古而妄誕如此若隰桑之繼菁莪則以朱傳云辭意大概與菁莪相似一語遂毅然並列耳至于棠棣毛本作常棣惟左傳趙孟賦棠棣作棠棣然按爾雅常棣是棣棠棣是栘本二物而韓詩序云夫栘燕兄弟也則亦以是詩篇名為棠棣似毛詩作常韓詩作棠兩有不同故藝文類聚亦云夫栘之華萼不煒可驗今詩傳作棠既從韓詩而詩説作常又從毛詩此則何解歷觀二書如鶼鶼之鳥蛩蛩之獸無不相比相附而此獨見異是何以故若南有嘉魚則儀禮諸書皆有四字並無截取嘉魚二字者且其篇次則自魚麗後繼以南有嘉魚又繼以南山有臺如燕禮鄉飲酒禮所云歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀類敘次秩秩何緣却南山有臺而竟以瓠葉繼之且爾雅臺是草名即臺夫須並不從草若云大臣報王徒以詩中萬夀字耳不知魯頌萬有千歲豳風萬夀無疆不必天子即士冠禮祝辭亦有眉夀萬年此可知也且襄二十四年子産寓書于韓宣子稱邦家之基二句昭十三年夫子美子産亦稱邦家之基二句若是報天子詩不得遞舉相贈矣况襄三十年季武子如宋報向戌之聘歸而復命公享之武子賦魚麗之卒章公賦南山有臺以報之若是諸侯報天子詩則魯公何得以此報其臣下此尤親切明著者也若皇皇者華亦非煌華莊子云折楊皇荂李延年造新曲曰皇之華皆是别詩惟宋陸佃妄云折楊逸詩皇荂即詩所謂皇皇者華是也愚者即以是言為據遂改皇皇者華為煌華則凡國語左傳所稱皇皇者華君教使臣曰必咨于周皇皇者華君教使臣曰每懷靡及何不憚煩也至以豳風為邠風而以七月一篇入小雅此即惑于豳雅豳頌之説而故為示異不知季子觀樂于其歌豳曰其周公之東乎則明注周公居東時詩非雅詩也至若信南山則截去信字獨稱南山節南山則截去南山獨稱節字不知何故若朱傳于斯干詩注有云儀禮下管新宫左傳宋元公賦新宫恐即此詩此竟鑿實曰斯干落寴宫然又以新為寴造一字書所無之字説見前卷至于裳裳者華作常常采菽作采叔雖有董氏注裳古文作常國語秦穆燕公子重耳賦采叔亦無草字為據然亦何必為此煌華詩説煌華天子遣使于四方歌此餞之此毛詩也若魯詩當以此為康王時詩四牡詩説四牡天子勞使臣之詩此襲左傳襄四年穆叔曰四牡君所以勞使臣也語然魯詩亦以此為康王時詩邠風詩説邠風周公陳農政之詩歐陽修曰七月燕齊魯三家皆無之申公魯詩家何以獨有此詩湛露詩説湛露天子燕同姓諸侯之詩此以詩文有在宗載考語故云若左傳寧武子云昔諸侯朝正于王王宴樂之于是乎賦湛露則諸侯朝正者獨同姓乎此皆有根有據之注非可以意為解斷者小正續詩説注云此卷十一篇皆宣王中興之詩當時亦秦之燕享以續周公之正樂矣毛氏為變小雅非也説一條詩傳全詩詩傳宣王中興而小正續焉六月北伐也出車勞將帥也采薇勞師也采芭南征也黍苖城申也車工吉日閲武也庭燎勤政也沔水念亂也無羊考牧也車舝樂親昏也出車為宣王時詩本漢書丐奴傳云宣王興師命將征伐玁狁詩人美大其功曰出車彭彭城彼朔方則固以出車為宣王時詩矣然詩中有王命南仲語按漢書古今人表有南中中即仲也如仲丁曰中丁類在厲王時則豈厲宣代接仲固厲時人而為宣率師者乎又按常武詩有王命卿士南仲太祖太師皇父則又云命即士之以南仲為太祖而兼太師字皇父者則太師皇父固宣卿士而南仲時已為其始祖矣豈有始祖與其孫同時者則又斷非宣王時可知也若采薇之為宣王時亦見丐奴傳云周懿王時王室遂衰詩人始疾之而歌之曰靡室靡家玁狁之故至懿王曾孫宣王興師以伐玁狁詩人美大其功此則時世之近可據者至若以庭燎為宣王勤政則外紀有云宣二十二年王晏起薑后脫簪珥諫則此詩問夜亦正與晏起相反凡此者皆非時世先後之可定也亦略之可耳車舝詩説車舝宣王中興士得寴迎其友賀之而作此詩首章賦也次章興也三章賦也四章興也禮云昏禮不賀人之序也古無賀昏事且朋友亦安得有雖無德與汝諸語若詩本五章此作四章亦不可解小正傳詩説注云鼓鐘而下二十八篇蓋自昭穆至于幽平或公卿大夫諷諫于上或士君子怨思于下亦皆出乎好惡之公而得夫性情之正夫子録之以存鑒戒謂之傳者以其非奏樂之正經而亦可傳也三大正傳倣此十條鄭氏詩譜云節南山至何草不黃四十四篇前儒申公毛公皆以為幽王之變小雅此不知何等申公乃附端木子立説而矛盾至此鼓鐘詩傳昭王南缺五字大夫憂之賦鼓鐘詩説昭王南遊宴樂于淮水之上君子憂傷而作是詩按朝説之詩序論謂三家以鼓鐘為昭王時詩蓋本鄭玄中候握河記注云昭王時鼓鐘之詩所為作者依三家為説也然孔氏正義又謂惟韓詩以鼓鐘為昭王時作其曰三家者亦臆説耳則昭王時世亦未可遽定者三古至今日世逺言沫即漢書前儒師授確確尚傳習多誤乃以數千百年後一人之臆斷而欲以翻數千百年前相傳之實事豈有此理圻招詩傳圻招缺三字道穆王西征祭公述民怨以諫賦圻招詩説圻招穆王西征七萃之士咸怨祭公謀父作此詩以諷諫賦也按小雅並無圻招但有圻父此有圻招無圻父則必圻招即圻父也但左傳右尹子革曰昔穆王欲肆其心周行天下祭公謀父作祈昭之詩以止王心此祈昭原是祈字故解者有謂祈求也昭明也言求明德也惟杜預注以祈為圻即圻父司馬之官昭其名也此遂襲其説竟去圻父名而易以圻招可怪之甚但祈昭原有詩一章如云祈昭之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心此真祭公謀父之所作也圻父别一詩而亦曰祭公謀父所作若欲分為二則不宜改圻父為圻招若欲合為一則祈昭七句圻父二章每章四句體製既殊句法亦異即欲竊冠祈昭于其首如唐棣麥秀之故智而亦不可得則又何苦好為此不經之事而自貽笑也况左傳又有魯穆叔如晉賦圻父若祈招圻父本一詩則不宜彼此各見如此也小辨詩傳尹伯竒缺三字後母鄰大夫閔之賦小辨詩説小辨尹伯奇為後母所譖而出其鄰大夫作此詩以諷其父吉甫此本孟子趙岐注也又論衡亦云伯竒放流首髮早白故詩曰維憂用老此與韓詩以黍離為伯竒之弟伯封作同或曰伯竒即宜臼褒姒所生者名伯服非長子而亦稱伯則必並從伯字可知耳然總係傅會不可信若其云鄰大夫作者此竊琴操云伯竒既逐履霜以足採楟花以食其鄰大夫閔之乃賦小辨故詩傳詩説皆顯顯鑿鑿並曰鄰大夫閔之乃作此詩苐諸琴操詞率周秦以後文人墨士之所為子貢在聖門何緣得採掇詳析乃爾若謂琴操本詩傳則詩傳前此未出在兩漢詩學盛行之際尚未之見而他書則未有與琴操同者謂非詩傳本琴操不可巧言何人斯詩傳大夫傷于缺二字賦巧言詩説巧言周幽王時大夫傷于讒而作是詩前三章皆賦也四章興而比也五章興也下章皆賦也原注云分何人斯二篇非也按巧言六章何人斯八章合之則十三章矣只刺讒一節豈得與正月同其章數且巧言六章既已逐章分解而何人斯一詩則但以下章二字概之所云下則明明以上下相隔為另一篇矣作偽之自露其綻如此若其設心為是者則以朱子集傳于何人斯篇注云此詩與上篇文意相似疑出一手但此篇專責讒人上篇先刺聽者耳此因而合之作偽至此無所不至矣鳴鳩詩傳詩説同小雅無鳴鳩詩惟國語秦伯燕公子重耳賦鳩飛注云鳩飛即小宛此無小宛名而有鳴鳩豈即以是為小宛詩耶苐秦伯賦鳩飛而公子所賦者又為河水今三百亦並無河水詩則意兩詩皆逸詩而注者誤指遂使無學者襲之而實非也且鳩飛非鳴鳩也白華詩説幽王寵褒姒廢薑后后歸申而作此詩按史記廢申后廢之宫中耳考諸侯有出夫人禮天子則否諸侯出夫人如春秋郯伯姬來歸把叔姬來歸是也天子以天下為家安所得出據國語周幽王逐太子宜臼宜臼出奔申則奔申宜臼耳十月之交詩説十月之交幽王之時天變見于上地變動于下而姦臣亂政于外嬖妾敗德于內大夫憂亂亡之將至故作是詩按漢書谷永傳閻妻驕扇日以不臧顔師古曰此魯詩十月之交篇言厲王無道內寵熾盛政化失理故災異而日為之食也則魯詩本以此詩為厲王時詩而以豔妻為閻妻不謂申培公言詩于魯而仍非魯詩如此懿戒詩傳衛武缺五字賦懿戒詩説懿戒衛武公自警兼訓國人按此本抑詩其稱抑者以詩首句曰抑抑威儀故耳若國語左史倚相曰昔衛武公年九十有五矣猶針警乎國于是乎作懿戒以自警也其又云懿戒者以抑與懿字音之轉而抑可以戒故曰懿戒非詩名也故韋昭注云懿大雅抑之篇不並稱懿戒但稱懿字則祗此一字為詩名瞭然可見蓋字有從詩字命名者有從詩義命名者此則從詩字命名者耳至如左傳襄二十二年鄭公孫黑肱有疾歸邑于公召室老宗人立假而使黜官薄祭盡歸其餘邑曰生在敬戒不在畜也君子曰善戒詩曰慎爾侯度用戒不虞此亦似引抑詩以美其戒然但取用戒不虞一語以斷取其義故曰善戒善戒者善其生在敬戒一語也若愚者讀此必曰善即懿也國語稱懿戒左傳稱善戒將善戒亦詩篇名矣蓼莪詩説蓼莪王室昏亂讒邪肆行其大夫士有沒而不得其所者孝子痛傷而作是詩按此詩並無沒而不得所意惟晉書王褒父儀為文帝所殺褒讀蓼莪未嘗不流涕此則有沒而不得所意豈有以讀詩者之事作詩義者若然則後漢周槃讀汝墳卒章廢卷涕泣不是念文王五代齊楊愔幼時其舅源子恭問讀詩至渭陽未愔便號泣不是送重耳若其確指為讒邪者則以飄風發發一語與何人斯飄風相類遂云然所謂有髯皆關公耳雨無其極詩傳詩説同毛本作雨無正獨劉元城云嘗讀韓詩有雨無極篇序云雨無極正大夫刺幽王也其詩文篇首有雨無其極傷我稼穡八字此其所襲也苐申公魯詩宗亦襲韓詩不可解節詩傳桓王伐鄭缺曰字家父諫之賦節詩説同按左傳昭二年季平子賦節之卒章節即節南山也故此亦作節以示異耳若其稱桓王時則以詩中有家父作誦語而春秋桓八年天王使家父來聘是桓王時故云此則作偽之最巧者都人士詩説都人士尹伯封作周既東遷見西周風俗之美而傷今之不古若賦也按尹伯封見韓詩黍離章謂伯竒之弟然皆謂閔兄作非傷周也且既是尹氏豈有自稱其族為彼君子女之理若孔氏正義謂此詩首章惟毛氏有之齊魯韓三家皆無有今此云傷西周風物之美者徒以首章行歸于周一語耳若無首章恐其所指亦未必即見為西周矣申公魯詩宗何自相抵牾如此詩傳詩説駁義卷四
